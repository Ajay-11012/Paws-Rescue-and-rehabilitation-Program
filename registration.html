<body>
    <!-- ===== HEADER / NAVBAR ===== -->

  <!-- Hamburger (left) -->

  <!-- Logo + Title -->

    <h1>Paws Rescue & Rehabilitation Program</h1>
  </div>

  <!-- Desktop Menu -->
  <nav class="nav-links">
    <a href="./homepage.html" class="active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="./aboutus-home.html"><i class="fa-solid fa-circle-info"></i>About Us</a>
    <a href="./contact-home.html"><i class="fa-solid fa-envelope"></i>Contact</a>
    <a href="../login.html">Login / Signup</a>
  </nav>
<!-- Mobile Slide Menu -->
<div class="mobile-menu" id="mobileMenu">
  <div class="mobile-header">
    <div class="brand">
      <img src="https://i.postimg.cc/NjDChGWh/Whats-App-Image-2026-03-23-at-12-33-09.jpg" alt="logo">
      <h1>Paws Rescue & Rehabilitation Program</h1>
    </div>

  </div>

  <div class="mobile-links">
    <a href="./homepage.html" class="active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="./aboutus-home.html"><i class="fa-solid fa-circle-info"></i>About Us</a>

    <a href="../login.html">Login / Signup</a>
  </div>
</div>

<div class="overlay" id="overlay"></div>
</header>
<main>
  <div class="register-wrapper">
    <div class="register-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join Project Paws and help animals in need</p>
      <form>

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="Enter phone number" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" required>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="register-btn">Register</button>
        <p class="login-text">
          Already have an account?
          <a href="./login.html">Login</a>
        </p>

      </form>
    </div>
  </div>
  </main>
  <!-- ===== FOOTER ===== -->
