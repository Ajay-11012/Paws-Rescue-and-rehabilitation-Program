<main>
  <div class="register-wrapper">
    <div class="register-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join Project Paws and help animals in need</p>
      <form>

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="Enter phone number" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" required>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required>
        </div>

        <!-- NGO EXTRA FIELDS -->
        <div id="ngoFields" style="display: none;">

          <div class="input-group">
            <label>NGO Name</label>
            <input type="text" placeholder="Enter NGO name">
          </div>

          <div class="input-group">
            <label>Location</label>
            <input type="text" placeholder="Enter NGO location">
          </div>

          <div class="input-group">
            <label>Upload Proof Document</label>
            <input type="file">
          </div>

        </div>

        <button type="submit" class="register-btn">Register</button>

        <p class="login-text">
          Already have an account?
          <a href="./login.html">Login</a>
        </p>

      </form>
    </div>
  </div>
  </main>
