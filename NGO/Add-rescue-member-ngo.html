<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
 flex-direction: column;
  background:#10305d;
}
main{
    flex: 1;
    margin: 6% 0px 0px 39.5%;
}

.container{
  width:90%;
  max-width:420px;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:30px;
  color:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.card h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

.input-group{
  margin-bottom:15px;
}

.input-group label{
  font-size:14px;
}

.input-group input,
.input-group textarea,
.input-group select{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:10px;
  margin-top:5px;
  background:rgba(255,255,255,0.2);
  color:#000000;
  font-size:14px;
}

.input-group input::placeholder,
textarea::placeholder{
  color:#000000;
}

.input-group input:focus,
textarea:focus,
select:focus{
  background:rgba(255,255,255,0.3);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#44a9c2;
  color:#631f1f;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#034caa;
  transform:scale(1.03);
}

</style>
</head>
<script>
document.getElementById("rescueForm").addEventListener("submit", function(e){

  e.preventDefault(); // Stop actual form submission

  alert("✅ Member Successfully Added!");

  // Optional: clear form after submit
  this.reset();

});
</script>
<body>

<main>
<div class="container">
  <div class="card">

    <h2>🐾 Add Rescue Member</h2>

    <!-- FORM START -->
    <div id="formContainer">

  <form id="rescueForm">

    <div class="input-group">
      <label>Name</label>
      <input type="text" name="name" placeholder="Enter full name" required>
    </div>

    <div class="input-group">
      <label>Information</label>
      <textarea name="info" rows="3" placeholder="Enter rescue details" required></textarea>
    </div>

    <div class="input-group">
      <label>Age</label>
      <input type="number" name="age" placeholder="Enter age" min="1" required>
    </div>

    <div class="input-group">
      <label>Gender</label>
      <select name="gender" required>
        <option value="">Select gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="input-group">
      <label>Assign Email</label>
      <input type="email" name="email" placeholder="Enter email" required>
    </div>

    <div class="input-group">
      <label>Assign Password</label>
      <input type="password" name="password" placeholder="Enter password" minlength="6" required>
    </div>

    <button type="submit">ADD Member</button>

  </form>

</div>
  </div>
</div>
</main>
<!-- ===== FOOTER ===== -->

<script>
document.getElementById("rescueForm").addEventListener("submit", function(e){

  e.preventDefault(); // stop page reload

  document.getElementById("formContainer").innerHTML = `
    <div style="text-align:center; padding:40px;">
      <h2>✅ Rescue Member Added Successfully</h2>
      <p>New rescue member has been assigned work.</p>
    </div>
  `;

});
</script>
