<main>
<section class="treatment-section">

  <h1 class="section-title">Update Treatment</h1>

  <div class="treatment-box">
    <form>

      <div class="form-group">
        <label>Animal ID</label>
        <input type="text" placeholder="Enter Animal ID">
      </div>

      <div class="form-group">
        <label>Diagnosis</label>
        <input type="text" placeholder="Enter diagnosis">
      </div>

      <div class="form-group">
        <label>Medicines</label>
        <input type="text" placeholder="Enter medicines">
      </div>

      <div class="form-group">
        <label>Progress</label>
        <textarea placeholder="Describe recovery progress"></textarea>
      </div>

      <div class="btn-container">
        <button type="submit">Save</button>
      </div>

    </form>
  </div>
</section>
